sdk: seher
model: build
plan_model: plan
languages:
  pr: English
  plan: English
cleanup_after_pr: true
groups:
  review:
    if:
      file-changed: test
    max_retries: 3
    steps:
      review-uncommitted:
        prompt: |-
          /review-uncommitted
      fix-review-result:
        prompt: |
          Based on the review results below, address anything that seems to need attention.
          If you judge something to be a false positive, leave a reason and skip it.
          If there is nothing to report, do nothing.
          ---
          {prev.output}
steps:
  mise-trust:
    command: |-
      mise trust || true
  write-test-first:
    prompt: |
      Based on {plan}, create **test code only**.
      The production code implementation will be done in the next step.
      Do not write any non-test logic in this step.

      **Why write only tests:**
      The purpose of test-first is to specify "what to build" in code before starting implementation.
      If you write the implementation too, the tests become a rubber-stamp of the implementation rather than a specification, and you lose the chance to notice design flaws.
      Tests are expected to fail at this point; write them on the assumption they will pass once implementation is complete.

      **Steps:**
      1. Review the plan report and understand the planned behavior and interfaces.
      2. Examine the existing code and tests in the target module to understand the test patterns.
      3. Write unit tests for the planned feature.
      4. Decide whether integration tests are needed, and write them if so:
         - Is there a data flow spanning three or more modules?
         - Does a new status/state join an existing workflow?
         - Does a new option propagate all the way through the call chain?
         - Is the new feature triggered from an existing entry point (CLI command, API endpoint, UI event, etc.)?
         - If any of these apply, write an integration test.
         - When the feature is triggered from an entry point, include at least one test that exercises the behavior through that entry point instead of calling the new function directly.
      5. Run the type checker/build and confirm the test code has no syntax errors.

      **On creating stubs to make the build pass:**
      Only when a function or type referenced by a test is undefined and the build fails,
      place a **minimal stub only** on the implementation side.
      The stub body must always be an "unimplemented" marker:
      - Rust: `todo!()` / `unimplemented!()`
      - TypeScript / JavaScript: `throw new Error("not implemented")`
      - Go: `panic("not implemented")`
      - Python: `raise NotImplementedError`

      Never write even a single line of real logic inside a stub.
      "It's easy, so I'll just implement it while I'm at it" is forbidden. If you feel the urge, that's work for the next step.

      **Test-writing policy:**
      - Follow the project's existing test patterns (naming conventions, directory layout, helpers).
      - Write tests using a Given-When-Then structure.
      - One test, one concept. Don't mix multiple concerns into a single test.
      - Cover the happy path, error cases, boundary values, and edge cases.
    if:
      no-file-changes:
        retry: true
  implement-after-tests:
    prompt: |
      Following the plan in {plan}, implement the code so that the tests pass.

      **Important**: The tests have already been written. Implement the code so the existing tests pass.
      - Review the existing test files to understand the expected behavior.
      - Implement the production code so the tests pass.
      - Defining functions and types is not the end of the implementation. Wire them into the existing execution paths (entry points, routing, command definitions, event handlers, etc.) so the feature is actually invoked.
      - Since tests are already written, you generally don't need to add more, but you may add tests if necessary.
      - You may modify tests if a fix requires it.
      - Running the build is mandatory. After implementing, run the build (type check) and confirm there are no type errors.
      - Running the tests is mandatory. After the build succeeds, always run the tests and confirm all of them pass.
      - If you introduce a new contract string such as a file name or config key, define it as a constant in a single place.

      **Required self-check before completing implementation:**
      Before running the build and tests, confirm the following:
      - If you added a new parameter/field, verified via grep that it is actually passed in from the callers.
      - Verified via grep that every newly defined function/class/type/constant is referenced from production code other than tests (i.e. reachable from an entry point). Code referenced only by tests is unwired and therefore incomplete.
      - Where you use `??`, `||`, or `= defaultValue`, verified the fallback is actually necessary.
      - Confirmed that code/exports replaced during refactoring haven't been left behind.
      - Confirmed you haven't added functionality that wasn't requested in the task instructions.
      - Confirmed no if/else branches call the same function differing only by arguments.
      - Confirmed the new code matches existing implementation patterns (API call style, type definition style, etc.).

      **Required output (include the headings)**
      ## Summary
      - Overview of the work performed
      ## Changes
      - Overview of the changes
      ## Build Result
      - Build execution result
      ## Test Result
      - Test command and result
    if:
      no-file-changes:
        retry: true
  verify-wiring:
    prompt: |-
      Verify that the implemented feature is actually wired into the production execution paths.

      **Background**: Even if functions and types are defined and the tests pass, a feature that is unreachable from any entry point is the same as a feature that does not exist. This step exists to prevent work from being marked complete while it is "implemented but never called from the main flow".

      **Steps:**
      1. From the changes made in this task (uncommitted changes plus commits since the base branch), list the functions, classes, types, constants, and exports that were added or modified.
      2. For each of them, verify via grep that it is referenced from production code other than test code.
      3. Treat anything referenced only by tests as "unwired": consult {plan} and wire it into a call path from an entry point (main, router, CLI command definition, UI event, DI registration, plugin registration, etc.).
      4. If new config keys, CLI flags, or environment variables were introduced, confirm that both the reading side and the passing side exist and that values actually propagate end to end.
      5. If you added or fixed any wiring, rerun the build and the tests and confirm everything passes.

      **Judgment criteria:**
      - If wiring is intentionally unnecessary (e.g. library code whose purpose is to be exported as a public API), you may skip it, but state the reason explicitly in the output.

      **Required output (include the headings)**

      ## Wiring Verification Result

      - For each new symbol, where it is referenced from production code (file:line)
      - If unwired code was fixed, what was done and the rerun build/test results
      - Anything judged as not needing wiring, with the reason
  only-english:
    prompt: |-
      /only-english
  review-pass:
    group: review
after-pr:
  pr-ready:
    command: |-
      gh pr ready {pr.number}
  sync-base:
    command: |
      base=$(gh pr view {pr.number} --json baseRefName -q '.baseRefName')
      git fetch origin "$base"
      git merge "origin/$base" --no-edit
  resolve-conflict:
    skip: prev.success
    prompt: |
      A conflict with the base branch occurred during `git merge`.
      Check the unresolved files with `git status`, resolve all conflict
      markers (<<<<<<<), then run `git add <files>` / `git commit`.
      There is no need to push — the next step handles that.
  push-after-sync:
    command: |-
      git push
  wait-ci:
    command: |-
      gh pr checks {pr.number} --watch
  fix-ci-error:
    skip: prev.success
    prompt: |
      The GitHub Actions CI for PR #{pr.number} is failing.
      Identify the failing check with `gh pr checks {pr.number}`,
      check the detailed logs with `gh run view <run-id> --log-failed` or similar, and fix the cause.
      After fixing it, update the PR branch with git add / commit / push.
    if:
      file-changed: sync-base
    next: wait-ci
  merge:
    command:
    - |-
      test "$(gh pr view {pr.number} --json statusCheckRollup -q '.statusCheckRollup | length')" -eq 0 || gh pr checks {pr.number} --watch
    - |-
      gh pr merge {pr.number} --squash
